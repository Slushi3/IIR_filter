# Tiny Tapeout project information
project:
  title:        "1st Order IIR Low-pass Filter"
  author:       "Elton D'Mello"
  discord:      ""
  description:  "Exponential moving average IIR low-pass filter using shift-and-add only. Alpha=3 (1/8 smoothing factor), 11-bit accumulator, no multipliers."
  language:     "Verilog"
  clock_hz:     0
  tiles:        "1x1"
  top_module:   "tt_um_example"
  source_files:
    - "project.v"

pinout:
  # Inputs
  ui[0]: "Sample bit 0 (LSB)"
  ui[1]: "Sample bit 1"
  ui[2]: "Sample bit 2"
  ui[3]: "Sample bit 3"
  ui[4]: "Sample bit 4"
  ui[5]: "Sample bit 5"
  ui[6]: "Sample bit 6"
  ui[7]: "Sample bit 7 (MSB)"
  # Outputs
  uo[0]: "Filtered output bit 0 (LSB)"
  uo[1]: "Filtered output bit 1"
  uo[2]: "Filtered output bit 2"
  uo[3]: "Filtered output bit 3"
  uo[4]: "Filtered output bit 4"
  uo[5]: "Filtered output bit 5"
  uo[6]: "Filtered output bit 6"
  uo[7]: "Filtered output bit 7 (MSB)"
  # Bidirectional pins
  uio[0]: ""
  uio[1]: ""
  uio[2]: ""
  uio[3]: ""
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

# Do not change!
yaml_version: 6
